<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transformer — Step by Step</title>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="wikipedia.css?v=2">
<style>
    :root {
      --bg: #0a0c10;
      --bg2: #0f1117;
      --bg3: #151820;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.13);
      --text: #e8eaf0;
      --muted: #6b7280;
      --dim: #3a3f4a;
      --blue: #4f9eff;
      --blue-d: #1a3a6e;
      --blue-l: #a8d0ff;
      --green: #2dd9a0;
      --green-d: #0d3d2a;
      --orange: #ff7b35;
      --orange-d: #4a1f00;
      --purple: #9f7fff;
      --purple-d: #2a1a5e;
      --amber: #ffbe3d;
      --amber-d: #3d2800;
      --red: #ff5252;
      --teal: #1de9b6;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79, 158, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 158, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title-block {}

    .title-block h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
      color: #fff;
      line-height: 1.2;
    }

    .title-block .sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 500;
      border: 0.5px solid;
      letter-spacing: 0.5px;
    }

    .badge-blue {
      border-color: var(--blue);
      color: var(--blue-l);
      background: rgba(79, 158, 255, 0.08);
    }

    /* ── Phase strip ── */
    .phase-strip {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }

    .phase-strip::-webkit-scrollbar {
      display: none;
    }

    .phase-node {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1.5px solid var(--dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .phase-node.done {
      border-color: var(--green);
      color: var(--green);
    }

    .phase-node.active {
      border-color: var(--blue);
      color: #fff;
      background: var(--blue);
      box-shadow: 0 0 12px rgba(79, 158, 255, 0.4);
    }

    .phase-node:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 100%;
      top: 50%;
      width: 4px;
      height: 1px;
      background: var(--dim);
      transform: translateY(-50%);
      margin-left: 0px;
    }

    /* ── Main stage ── */
    #stage {
      position: relative;
      width: 100%;
      height: 440px;
      background: var(--bg2);
      border: 0.5px solid var(--border2);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    #stage-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── Animated text overlay ── */
    #text-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 20px 18px;
      background: linear-gradient(transparent, rgba(10, 12, 16, 0.97) 30%);
      pointer-events: none;
      z-index: 20;
      min-height: 90px;
    }

    .phase-tag {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--blue);
      font-weight: 700;
      margin-bottom: 5px;
      opacity: 0;
      transform: translateY(6px);
      transition: all 0.4s;
    }

    .phase-tag.show {
      opacity: 1;
      transform: translateY(0);
    }

    .typewriter-text {
      font-size: 12px;
      color: var(--text);
      line-height: 1.7;
      min-height: 40px;
      font-family: 'JetBrains Mono', monospace;
    }

    .typewriter-text .cursor {
      display: inline-block;
      width: 7px;
      height: 13px;
      background: var(--blue);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.8s steps(1) infinite;
    }

    @keyframes blink {

      0%,
      49% {
        opacity: 1
      }

      50%,
      100% {
        opacity: 0
      }
    }

    .highlight-key {
      color: var(--amber);
      font-weight: 700;
    }

    .highlight-formula {
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
    }

    .highlight-token {
      color: var(--orange);
      font-weight: 700;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 0.5px solid var(--border2);
      background: var(--bg3);
      color: var(--text);
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .ctrl-btn:hover {
      background: var(--bg2);
      border-color: var(--blue);
      color: var(--blue-l);
    }

    .ctrl-btn:disabled {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }

    .ctrl-btn.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #000;
      font-weight: 700;
    }

    .ctrl-btn.primary:hover {
      background: #6aaaff;
    }

    .ctrl-btn.danger {
      border-color: var(--red);
      color: var(--red);
    }

    .speed-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    .speed-label {
      font-size: 10px;
      color: var(--muted);
    }

    .speed-select {
      background: var(--bg3);
      border: 0.5px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      padding: 4px 8px;
      cursor: pointer;
    }

    /* ── Progress bar ── */
    .prog-wrap {
      margin: 12px 0 4px;
    }

    .prog-track {
      height: 3px;
      background: var(--bg3);
      border-radius: 2px;
      position: relative;
      overflow: visible;
    }

    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--teal));
      border-radius: 2px;
      transition: width 0.1s linear;
      position: relative;
    }

    .prog-fill::after {
      content: '';
      position: absolute;
      right: -4px;
      top: -3px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 8px var(--teal);
    }

    /* ── Phase info bar ── */
    .info-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 10px;
      color: var(--muted);
    }

    .phase-count {
      color: var(--blue-l);
      font-weight: 700;
    }

    /* ── Token chips (DOM) ── */
    .tok-chip {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      transition: all 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      z-index: 10;
    }

    .tok-word {
      padding: 5px 10px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      border: 1.5px solid;
      letter-spacing: 0.3px;
      transition: all 0.5s;
      white-space: nowrap;
    }

    .tok-id-label {
      font-size: 8px;
      opacity: 0.5;
      transition: opacity 0.4s;
    }

    /* ── Embedding cells ── */
    .emb-block {
      position: absolute;
      display: grid;
      grid-template-columns: repeat(4, 13px);
      gap: 1.5px;
      transition: all 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      z-index: 8;
    }

    .ecell {
      width: 13px;
      height: 13px;
      border-radius: 2px;
      transition: all 0.6s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6px;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 600;
    }

    /* ── Formula pill floating in stage ── */
    .formula-pill {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 12, 16, 0.9);
      border: 0.5px solid var(--border2);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 11px;
      color: var(--green);
      letter-spacing: 0.5px;
      white-space: nowrap;
      z-index: 15;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
      font-family: 'JetBrains Mono', monospace;
    }

    .formula-pill.visible {
      opacity: 1;
    }

    /* ── Attn weight badges ── */
    .attn-badge {
      position: absolute;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 4px;
      opacity: 0;
      transition: all 0.4s;
      pointer-events: none;
      z-index: 12;
    }
  </style>
</head>

<body>
  <div class="content-wrapper animation-wrapper">
<div id="app">
    <div class="header">
      <div class="title-block">
        <h1>BERT vs GPT Animation</h1>
        <div class="sub">Bidirectional Context vs Causal Autoregression</div>
      </div>
      <span class="badge badge-blue">
        <span>●</span> "The cat sat on mat"
      </span>
    </div>

    <div class="phase-strip" id="phaseStrip"></div>

    <div class="info-bar">
      <span id="phaseName" style="color:var(--text);font-size:11px;font-weight:500">—</span>
      <span class="phase-count" id="phaseCount">1 / 8</span>
    </div>

    <div id="stage">
      <canvas id="stage-canvas"></canvas>
      <div class="formula-pill" id="formulaPill"></div>
      <div id="domLayer"></div>
      <div id="text-overlay">
        <div class="phase-tag" id="phaseTag"></div>
        <div class="typewriter-text" id="typewriterEl"></div>
      </div>
    </div>

    <div class="prog-wrap">
      <div class="prog-track">
        <div class="prog-fill" id="progFill" style="width:0%"></div>
      </div>
    </div>

    <div class="controls" style="margin-top:14px">
      <button class="ctrl-btn" id="btnPrev" onclick="prevPhase()">← prev</button>
      <button class="ctrl-btn primary" id="btnPlayPause" onclick="togglePlay()">⏸ pause</button>
      <button class="ctrl-btn" id="btnNext" onclick="nextPhase()">next →</button>
      <button class="ctrl-btn danger" onclick="restartAll()">↺ restart</button>
      <div class="speed-wrap">
        <span class="speed-label">speed</span>
        <select class="speed-select" id="speedSel" onchange="setSpeed(this.value)">
          <option value="0.4">0.5×</option>
          <option value="0.7" selected>1×</option>
          <option value="1.4">2×</option>
          <option value="2.2">3×</option>
        </select>
      </div>
    </div>
  </div>

  <script>
    // ─── Constants ───────────────────────────────────────────
    const WORDS = ["The", "cat", "sat", "on", "mat"];
    const C = ["#4f9eff", "#2dd9a0", "#ff7b35", "#9f7fff", "#ffbe3d"];
    const CL = ["#a8d0ff", "#8fffdc", "#ffb590", "#d0b8ff", "#ffe09e"];
    const CD = ["#0a1d3e", "#062a1c", "#3a1200", "#1a0a3e", "#2d1e00"];
    const ATTN = [0.08, 0.22, 0.48, 0.13, 0.09];
    const ANORM = (() => { const s = ATTN.reduce((a, b) => a + b); return ATTN.map(v => v / s); })();

    function eI(t) { return t < .5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2 }
    function lerp(a, b, t) { return a + (b - a) * t }
    function embVal(t, d) { return (Math.sin(t * 2.3 + d * 1.7) + 1) / 2 }
    function vVal(t, d) { return (Math.cos(t * 2.1 + d * 1.4) + 1) / 2 }

    // ─── Phase definitions ────────────────────────────────────
    const PHASES = [
      {
        id: 0,
        name: "BERT Tokenization & Masking",
        formula: "input → [CLS] tokens [MASK]",
        tag: "Phase 1 — Masked Language Model",
        text: [
          { t: 0, s: "Unlike GPT, BERT sees the entire sequence at once.", hi: [] },
          { t: 1200, s: "During training, 15% of tokens are randomly <tok>masked out</tok>.", hi: ["tok"] },
          { t: 2800, s: "IDs: <key>[CLS], 2317, [MASK], 2951, [SEP]</key>", hi: ["key"] },
        ],
        duration: 4000,
      },
      {
        id: 1,
        name: "Embedding Lookup",
        formula: "token_id → vector",
        tag: "Phase 2 — Embedding Matrix",
        text: [
          { t: 0, s: "Each token grabs a dense semantic vector.", hi: ["key"] },
          { t: 1800, s: "Even the [MASK] token has a learned embedding.", hi: ["key"] },
          { t: 3200, s: "This provides the starting point for BERT's deep bidirectional processing.", hi: ["tok"] },
        ],
        duration: 5000,
      },
      {
        id: 2,
        name: "Absolute Positional Encoding",
        formula: "x = Embedding + PE",
        tag: "Phase 3 — Absolute Order",
        text: [
          { t: 0, s: "GPT often uses relative positions (like RoPE), but BERT uses absolute.", hi: ["key"] },
          { t: 2000, s: "Learned positional embeddings are added directly.", hi: ["key"] },
          { t: 3500, s: "This tells BERT exactly where every word sits in the sentence.", hi: ["tok"] },
        ],
        duration: 5000,
      },
      {
        id: 3,
        name: "Unmasked Projections",
        formula: "Q=xW_Q   K=xW_K   V=xW_V",
        tag: "Phase 4 — Bidirectional Setup",
        text: [
          { t: 0, s: "Every token projects into THREE vectors using learned weight matrices.", hi: [] },
          { t: 2000, s: "Unlike GPT's Decoder, BERT is an <key>Encoder-only</key> model.", hi: ["key"] },
          { t: 3000, s: "Therefore, there are NO Causal Masks applied here.", hi: ["key"] },
        ],
        duration: 5500,
      },
      {
        id: 4,
        name: "Bidirectional Attention Scores",
        formula: "score(i,j) = Q_i · K_j / √d_k",
        tag: "Phase 5 — Looking Left and Right",
        text: [
          { t: 0, s: "Token <tok>\"sat\"</tok> dots its Query with past AND future Keys.", hi: ["tok"] },
          { t: 2000, s: "This is the core of BERT: <key>Bidirectional Encoder Representations</key>.", hi: ["key"] },
          { t: 3200, s: "GPT couldn't do this, because it must generate text left-to-right.", hi: ["key"] },
        ],
        duration: 5000,
      },
      {
        id: 5,
        name: "Softmax → Weights",
        formula: "α = softmax(scores)",
        tag: "Phase 6 — Full Context Weights",
        text: [
          { t: 0, s: "Raw scores are passed through <key>softmax</key>.", hi: ["key"] },
          { t: 2200, s: "The [MASK] token is able to gather context from both sides.", hi: ["key"] },
          { t: 3500, s: "It looks at \"cat\" and \"on\" to figure out what it should be.", hi: ["tok"] },
        ],
        duration: 5000,
      },
      {
        id: 6,
        name: "Deep Context Gathering",
        formula: "output = Σ αᵢ · Vᵢ",
        tag: "Phase 7 — Context Vector",
        text: [
          { t: 0, s: "The scaled Value vectors are summed.", hi: ["key"] },
          { t: 2000, s: "This creates extremely rich, context-heavy representations.", hi: ["key"] },
          { t: 3400, s: "This is why BERT crushes GPT on classification and named entity tasks.", hi: ["tok"] },
        ],
        duration: 5500,
      },
      {
        id: 7,
        name: "Masked Language Modeling",
        formula: "FFN(x) → Predict [MASK]",
        tag: "Phase 8 — Output Head",
        text: [
          { t: 0, s: "The representation for [MASK] passes through the <key>Feed-Forward Network</key>.", hi: ["key"] },
          { t: 2200, s: "Instead of predicting the 'next' token like GPT, BERT predicts the <key>missing</key> token.", hi: ["key"] },
          { t: 3800, s: "Final output: BERT predicts <tok>\"sat\"</tok> with 99.8% confidence.", hi: ["tok"] },
        ],
        duration: 6000,
      },
    ];

    // ─── State ────────────────────────────────────────────────
    let curPhase = 0;
    let phaseT = 0;        // 0..1 within phase
    let playing = true;
    let speed = 0.7;
    let rafId = null;
    let lastTs = null;
    let typeIdx = 0;       // which text segment we're on
    let typePos = 0;       // char position in current segment
    let typeLast = null;
    let typeSegDone = false;

    const canvas = document.getElementById('stage-canvas');
    const ctx = canvas.getContext('2d');
    let SW = 0, SH = 0;

    function resizeCanvas() {
      const rect = document.getElementById('stage').getBoundingClientRect();
      SW = rect.width; SH = rect.height;
      canvas.width = SW * devicePixelRatio;
      canvas.height = SH * devicePixelRatio;
      canvas.style.width = SW + 'px';
      canvas.style.height = SH + 'px';
      ctx.scale(devicePixelRatio, devicePixelRatio);
    }

    // ─── DOM token chips ──────────────────────────────────────
    let tokEls = [], embEls = [];

    function buildDOM() {
      const dl = document.getElementById('domLayer');
      dl.innerHTML = '';
      tokEls = []; embEls = [];
      const spread = Math.min(100, (SW - 80) / 5);
      WORDS.forEach((w, i) => {
        const el = document.createElement('div');
        el.className = 'tok-chip';
        el.style.opacity = '0';
        el.innerHTML = `
      <div class="tok-word" style="border-color:${C[i]};background:${CD[i]};color:${CL[i]}">${w}</div>
      <div class="tok-id-label" style="color:${C[i]}">id:${2000 + i * 317}</div>`;
        dl.appendChild(el);
        tokEls.push(el);

        const eb = document.createElement('div');
        eb.className = 'emb-block';
        eb.style.opacity = '0';
        for (let d = 0; d < 16; d++) {
          const c = document.createElement('div');
          c.className = 'ecell';
          c.style.background = C[i];
          c.style.opacity = (0.2 + embVal(i, d % 8) * 0.8).toFixed(2);
          eb.appendChild(c);
        }
        dl.appendChild(eb);
        embEls.push(eb);
      });
    }

    function setTokPos(i, x, y, scale = 1, opacity = 1) {
      const el = tokEls[i];
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.opacity = opacity.toFixed(3);
      el.style.transform = `scale(${scale})`;
    }
    function setEmbPos(i, x, y, opacity = 1, scaleY = 1) {
      const el = embEls[i];
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.opacity = opacity.toFixed(3);
      el.style.transformOrigin = 'top center';
      el.style.transform = `scaleY(${scaleY})`;
    }

    function spread() { return Math.min(100, (SW - 80) / 5); }
    function tokX(i) { return 30 + i * spread(); }
    function tokBaseY() { return 70; }

    // ─── Phase strip ──────────────────────────────────────────
    function buildStrip() {
      const strip = document.getElementById('phaseStrip');
      strip.innerHTML = '';
      PHASES.forEach((p, i) => {
        const n = document.createElement('div');
        n.className = 'phase-node';
        n.textContent = i + 1;
        n.title = p.name;
        n.onclick = () => jumpToPhase(i);
        strip.appendChild(n);
        if (i < PHASES.length - 1) {
          const line = document.createElement('div');
          line.style.cssText = 'flex-shrink:0;width:16px;height:1px;background:var(--dim);align-self:center;margin:0 -2px';
          strip.appendChild(line);
        }
      });
    }
    function updateStrip() {
      const nodes = document.querySelectorAll('.phase-node');
      nodes.forEach((n, i) => {
        n.className = 'phase-node' + (i < curPhase ? ' done' : i === curPhase ? ' active' : '');
      });
    }

    // ─── Typewriter ───────────────────────────────────────────
    function startTypewriter(phaseIdx) {
      typeIdx = 0; typePos = 0; typeLast = null; typeSegDone = false;
      const tag = document.getElementById('phaseTag');
      tag.textContent = PHASES[phaseIdx].tag;
      tag.classList.add('show');
      renderTypewriter();
    }

    function parseSegment(raw) {
      return raw
        .replace(/<key>(.*?)<\/key>/g, '<span class="highlight-key">$1</span>')
        .replace(/<tok>(.*?)<\/tok>/g, '<span class="highlight-token">$1</span>');
    }

    function renderTypewriter() {
      const ph = PHASES[curPhase];
      if (!ph) return;
      const seg = ph.text[typeIdx];
      if (!seg) return;
      const plain = seg.s.replace(/<[^>]+>/g, '');
      const partial = plain.slice(0, typePos);
      // build highlighted partial
      let display = partial;
      if (typePos >= plain.length) {
        display = parseSegment(seg.s);
      }
      const el = document.getElementById('typewriterEl');
      el.innerHTML = display + (typePos < plain.length ? '<span class="cursor"></span>' : '');
    }

    function tickTypewriter(ts) {
      if (!typeLast) { typeLast = ts; return; }
      const ph = PHASES[curPhase];
      if (!ph) return;
      const seg = ph.text[typeIdx];
      if (!seg) return;
      const plain = seg.s.replace(/<[^>]+>/g, '');
      const dt = ts - typeLast;
      typeLast = ts;
      if (typePos < plain.length) {
        typePos += Math.ceil(dt / 28 * speed);
        typePos = Math.min(typePos, plain.length);
        renderTypewriter();
      } else if (!typeSegDone) {
        typeSegDone = true;
        renderTypewriter();
      }
    }

    function advanceTypewriterSegment(pt) {
      const ph = PHASES[curPhase];
      if (!ph) return;
      const dur = ph.duration;
      ph.text.forEach((seg, i) => {
        const segT = seg.t / dur;
        if (pt >= segT && i > typeIdx) {
          typeIdx = i; typePos = 0; typeSegDone = false;
        }
      });
    }

    // ─── Canvas rendering ─────────────────────────────────────
    function clearCanvas() { ctx.clearRect(0, 0, SW, SH); }

    function drawAttnArcs(progress, weights) {
      clearCanvas();
      if (progress <= 0) return;
      const sp = spread();
      const queryI = 2;
      const qx = tokX(queryI) + 28;
      const qy = tokBaseY() + 18;
      weights.forEach((w, i) => {
        const tw = w * progress;
        if (tw < 0.01) return;
        const tx = tokX(i) + 28;
        const ty = tokBaseY() + 18;
        const mx = (qx + tx) / 2;
        const my = qy - 70 - Math.abs(qx - tx) * 0.18;
        ctx.beginPath();
        ctx.moveTo(qx, qy);
        ctx.quadraticCurveTo(mx, my, tx, ty);
        ctx.strokeStyle = C[i];
        ctx.globalAlpha = tw * 0.85;
        ctx.lineWidth = Math.max(0.8, tw * 6);
        ctx.stroke();
        // arrowhead
        const ang = Math.atan2(ty - my, tx - mx);
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(tx - 9 * Math.cos(ang - 0.4), ty - 9 * Math.sin(ang - 0.4));
        ctx.lineTo(tx - 9 * Math.cos(ang + 0.4), ty - 9 * Math.sin(ang + 0.4));
        ctx.closePath();
        ctx.fillStyle = C[i];
        ctx.fill();
        ctx.globalAlpha = 1;
      });
    }

    function drawAttnWeightBadges(progress) {
      if (progress < 0.5) return;
      const a = (progress - 0.5) * 2;
      const sp = spread();
      ANORM.forEach((w, i) => {
        const x = tokX(i) + 5;
        const y = tokBaseY() - 18;
        ctx.globalAlpha = a * Math.min(1, w * 4);
        ctx.fillStyle = C[i];
        ctx.font = 'bold 10px JetBrains Mono, monospace';
        ctx.textAlign = 'center';
        ctx.fillText((w * 100).toFixed(0) + '%', x + 23, y);
      });
      ctx.globalAlpha = 1;
    }

    function drawValueMerge(progress) {
      clearCanvas();
      if (progress <= 0) return;
      const sp = spread();
      const outX = SW / 2;
      const outY = 300;
      ANORM.forEach((aw, i) => {
        const sx = tokX(i) + 28;
        const sy = tokBaseY() + 80;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        const c1x = sx, c1y = sy + 60;
        const c2x = outX, c2y = outY - 60;
        ctx.bezierCurveTo(c1x, c1y, c2x, c2y, outX, outY);
        ctx.strokeStyle = C[i];
        ctx.globalAlpha = aw * progress * 1.4;
        ctx.lineWidth = Math.max(0.5, aw * 7 * progress);
        ctx.setLineDash([5, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.globalAlpha = 1;
      });
      // convergence node
      const r = 22 * Math.min(1, progress * 2);
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 400);
      ctx.beginPath();
      ctx.arc(outX, outY, r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,123,53,0.15)';
      ctx.strokeStyle = C[2];
      ctx.lineWidth = 1.5 + pulse;
      ctx.fill(); ctx.stroke();
      if (progress > 0.5) {
        ctx.globalAlpha = (progress - 0.5) * 2;
        ctx.fillStyle = CL[2];
        ctx.font = "bold 11px 'JetBrains Mono', monospace";
        ctx.textAlign = 'center';
        ctx.fillText("sat'", outX, outY + 4);
        ctx.globalAlpha = 1;
      }
    }

    function drawQKV(progress) {
      clearCanvas();
      const sp = spread();
      const labels = ['Q', 'K', 'V'];
      const lc = [C[0], C[1], C[2]];
      if (progress < 0.3) return;
      const p2 = Math.min(1, (progress - 0.3) / 0.7);
      WORDS.forEach((_, i) => {
        const bx = tokX(i) + 28;
        const by = tokBaseY() + 60;
        labels.forEach((l, li) => {
          const a = Math.min(1, p2 * (3 - li * 0.5));
          ctx.globalAlpha = a * 0.85;
          const offX = (li - 1) * 14;
          ctx.beginPath();
          ctx.arc(bx + offX, by + 30 + li * 10, 6, 0, Math.PI * 2);
          ctx.fillStyle = lc[li];
          ctx.fill();
          ctx.fillStyle = '#000';
          ctx.font = 'bold 7px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(l, bx + offX, by + 33 + li * 10);
          ctx.globalAlpha = 1;
        });
      });
    }

    function drawFFN(progress) {
      clearCanvas();
      if (progress <= 0) return;
      const cx = SW / 2;
      const iy = 120, h1y = 220, oy = 330;
      const nHidden = 7;

      // input node
      ctx.beginPath();
      ctx.arc(cx, iy, 16, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(79,158,255,0.12)';
      ctx.strokeStyle = C[0];
      ctx.lineWidth = 1.5;
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = CL[0];
      ctx.font = "bold 9px 'JetBrains Mono',monospace";
      ctx.textAlign = 'center';
      ctx.fillText('ctx', cx, iy + 3);

      if (progress < 0.15) return;
      const p1 = Math.min(1, (progress - 0.15) / 0.5);
      // input → hidden lines
      for (let n = 0; n < nHidden; n++) {
        const nx = cx - 80 + n * 26;
        ctx.globalAlpha = p1 * 0.5;
        ctx.beginPath();
        ctx.moveTo(cx, iy + 16);
        ctx.lineTo(nx, h1y - 8);
        ctx.strokeStyle = C[0];
        ctx.lineWidth = 0.7;
        ctx.stroke();
        ctx.globalAlpha = 1;

        const pulse = 0.3 + 0.7 * (Math.sin(Date.now() / 300 + n) * 0.5 + 0.5) * p1;
        ctx.globalAlpha = pulse;
        ctx.beginPath();
        ctx.arc(nx, h1y, 9, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(79,158,255,0.2)';
        ctx.strokeStyle = C[0];
        ctx.lineWidth = 1;
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = CL[0];
        ctx.font = '6px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('relu', nx, h1y + 2);
        ctx.globalAlpha = 1;
      }

      if (progress < 0.55) return;
      const p2 = Math.min(1, (progress - 0.55) / 0.45);
      for (let n = 0; n < nHidden; n++) {
        const nx = cx - 80 + n * 26;
        ctx.globalAlpha = p2 * 0.5;
        ctx.beginPath();
        ctx.moveTo(nx, h1y + 8);
        ctx.lineTo(cx, oy - 16);
        ctx.strokeStyle = C[2];
        ctx.lineWidth = 0.7;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
      const pulse2 = 0.5 + 0.5 * Math.sin(Date.now() / 350);
      ctx.beginPath();
      ctx.arc(cx, oy, 18 * p2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,123,53,0.12)';
      ctx.strokeStyle = C[2];
      ctx.lineWidth = 1.5 + pulse2;
      ctx.fill(); ctx.stroke();
      if (p2 > 0.6) {
        ctx.globalAlpha = (p2 - 0.6) / 0.4;
        ctx.fillStyle = CL[2];
        ctx.font = "bold 9px 'JetBrains Mono',monospace";
        ctx.textAlign = 'center';
        ctx.fillText('out', cx, oy + 3);
        ctx.globalAlpha = 1;
      }

      // labels
      if (progress > 0.3) {
        ctx.globalAlpha = Math.min(1, (progress - 0.3) / 0.4);
        ctx.fillStyle = 'rgba(79,158,255,0.6)';
        ctx.font = "10px 'JetBrains Mono',monospace";
        ctx.textAlign = 'left';
        ctx.fillText('W₁ (expand)', cx + 30, (iy + h1y) / 2);
        if (progress > 0.6) ctx.fillText('W₂ (project)', cx + 30, (h1y + oy) / 2);
        ctx.globalAlpha = 1;
      }

      // Add & Norm box
      if (progress > 0.8) {
        const a = Math.min(1, (progress - 0.8) / 0.2);
        ctx.globalAlpha = a;
        const rx = cx - 55, ry = oy + 30;
        roundRect(ctx, rx, ry, 110, 26, 6);
        ctx.fillStyle = 'rgba(159,127,255,0.12)';
        ctx.strokeStyle = C[3];
        ctx.lineWidth = 1;
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = CL[3];
        ctx.font = "10px 'JetBrains Mono',monospace";
        ctx.textAlign = 'center';
        ctx.fillText('Add & LayerNorm', cx, ry + 17);
        ctx.globalAlpha = 1;
      }
    }

    function drawOutputBars(progress) {
      clearCanvas();
      if (progress <= 0) return;
      const vocabWords = ["cat", "sat", "on", "the", "mat", "hat", "bat", "ran"];
      const probs = [0.18, 0.31, 0.22, 0.12, 0.17, 0.04, 0.06, 0.08];
      // normalise
      const s = probs.reduce((a, b) => a + b);
      const np = probs.map(v => v / s);
      const n = vocabWords.length;
      const bw = 34, gap = 10;
      const totalW = n * (bw + gap) - gap;
      const sx = (SW - totalW) / 2;
      const baseY = 370;
      const maxH = 200;
      const topW = np.indexOf(Math.max(...np));

      np.forEach((p, i) => {
        const h = p * maxH * Math.min(1, progress * 2);
        const x = sx + i * (bw + gap);
        const y = baseY - h;
        ctx.beginPath();
        roundRect(ctx, x, y, bw, h, 3);
        ctx.fillStyle = i === topW ? C[3] : 'rgba(79,158,255,0.25)';
        ctx.strokeStyle = i === topW ? C[3] : C[0];
        ctx.globalAlpha = 0.2 + p * 0.8;
        ctx.lineWidth = i === topW ? 1.5 : 0.7;
        ctx.fill(); ctx.stroke();
        ctx.globalAlpha = 1;

        if (progress > 0.4) {
          const a = Math.min(1, (progress - 0.4) / 0.4);
          ctx.globalAlpha = a;
          ctx.fillStyle = i === topW ? CL[3] : 'rgba(168,208,255,0.8)';
          ctx.font = `${i === topW ? 'bold ' : ''} 10px 'JetBrains Mono',monospace`;
          ctx.textAlign = 'center';
          ctx.fillText(vocabWords[i], x + bw / 2, baseY + 14);
          ctx.fillStyle = i === topW ? C[3] : 'rgba(79,158,255,0.7)';
          ctx.font = `bold 10px 'JetBrains Mono',monospace`;
          ctx.fillText(Math.round(p * 100) + '%', x + bw / 2, y - 5);
          ctx.globalAlpha = 1;
        }
      });
      // top label
      if (progress > 0.7) {
        ctx.globalAlpha = (progress - 0.7) / 0.3;
        ctx.fillStyle = C[3];
        ctx.font = "bold 12px 'Syne',sans-serif";
        ctx.textAlign = 'center';
        ctx.fillText('▲  next token: "sat" (31%)', SW / 2, baseY - maxH - 16);
        ctx.globalAlpha = 1;
      }
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // ─── Per-phase render ─────────────────────────────────────
    function renderPhase(pt, ts) {
      const sp = spread();
      clearCanvas();

      // Phase 0 — tokenization
      if (curPhase === 0) {
        WORDS.forEach((_, i) => {
          const delay = i * 0.14;
          const tp = eI(Math.max(0, Math.min(1, (pt - delay) / (1 - delay * 4))));
          setTokPos(i, tokX(i), lerp(-50, tokBaseY(), tp), 1, tp);
          setEmbPos(i, tokX(i) - 1, 200, 0);
        });
        setFormula('input → token IDs   [2000, 2317, 2634, 2951, 3268]');
      }

      // Phase 1 — embeddings appear
      else if (curPhase === 1) {
        WORDS.forEach((_, i) => {
          setTokPos(i, tokX(i), tokBaseY(), 1, 1);
          const delay = i * 0.11;
          const ep = eI(Math.max(0, Math.min(1, (pt - delay) / (1 - delay * 4))));
          setEmbPos(i, tokX(i) - 1, lerp(60, 115, ep), ep, ep);
          // Update cell colors
          [...embEls[i].children].forEach((c, d) => {
            const v = embVal(i, d % 8);
            c.style.background = C[i];
            c.style.opacity = (0.2 + v * 0.8 * ep).toFixed(2);
            c.textContent = ep > 0.6 ? v.toFixed(1) : '';
          });
        });
        setFormula('W_E[token_id]  →  8-dim embedding vector');
      }

      // Phase 2 — positional encoding shimmer
      else if (curPhase === 2) {
        WORDS.forEach((_, i) => {
          setTokPos(i, tokX(i), tokBaseY(), 1, 1);
          setEmbPos(i, tokX(i) - 1, 115, 1, 1);
          [...embEls[i].children].forEach((c, d) => {
            const v = embVal(i, d % 8);
            const pos = (Math.sin(i / (Math.pow(10000, 2 * (d % 8) / 8))) * 0.5 + 0.5);
            const blended = Math.min(1, v * (1 - pt * 0.4) + pos * (pt * 0.4));
            // interpolate color toward purple
            const r0 = parseInt(C[i].slice(1, 3), 16), g0 = parseInt(C[i].slice(3, 5), 16), b0 = parseInt(C[i].slice(5, 7), 16);
            const fr = Math.round(r0 + (159 - r0) * pt * 0.6), fg = Math.round(g0 + (127 - g0) * pt * 0.6), fb = Math.round(b0 + (255 - b0) * pt * 0.6);
            c.style.background = `rgb(${fr},${fg},${fb})`;
            c.style.opacity = (0.2 + blended * 0.8).toFixed(2);
          });
        });
        setFormula('x_i = Embedding_i + PE(i)   pos info injected');
      }

      // Phase 3 — Q K V dots
      else if (curPhase === 3) {
        WORDS.forEach((_, i) => {
          setTokPos(i, tokX(i), tokBaseY(), 1, 1);
          setEmbPos(i, tokX(i) - 1, 115, 0.7, 1);
        });
        drawQKV(pt);
        setFormula('Q = xW_Q   K = xW_K   V = xW_V');
      }

      // Phase 4 — Q·K attention arcs
      else if (curPhase === 4) {
        WORDS.forEach((_, i) => {
          const isQ = i === 2;
          setTokPos(i, tokX(i), tokBaseY(), isQ ? 1.08 : 0.92, 1);
          setEmbPos(i, tokX(i) - 1, 115, 0.35, 1);
          tokEls[i].querySelector('.tok-word').style.boxShadow = isQ ? `0 0 0 2px ${C[i]},0 0 16px ${C[i]}66` : 'none';
        });
        const rawW = WORDS.map((_, i) => {
          let s = 0; for (let d = 0; d < 4; d++) s += embVal(2, d) * embVal(i, d); return s;
        });
        const mn = Math.min(...rawW), mx = Math.max(...rawW);
        const normW = rawW.map(v => (v - mn) / (mx - mn));
        drawAttnArcs(pt, normW);
        setFormula('score(sat, j) = Q_sat · K_j / √d_k');
      }

      // Phase 5 — softmax
      else if (curPhase === 5) {
        WORDS.forEach((_, i) => {
          const isQ = i === 2;
          setTokPos(i, tokX(i), tokBaseY(), isQ ? 1.08 : 0.92, 1);
          setEmbPos(i, tokX(i) - 1, 115, 0.25, 1);
        });
        const rawW = WORDS.map((_, i) => {
          let s = 0; for (let d = 0; d < 4; d++) s += embVal(2, d) * embVal(i, d); return s;
        });
        const mn = Math.min(...rawW), mx = Math.max(...rawW);
        const normRaw = rawW.map(v => (v - mn) / (mx - mn));
        const mixed = ANORM.map((a, i) => lerp(normRaw[i], a, pt));
        drawAttnArcs(1, mixed);
        drawAttnWeightBadges(pt);
        setFormula('α_i = exp(score_i) / Σ_j exp(score_j)   →   Σα=1.0');
      }

      // Phase 6 — value merge
      else if (curPhase === 6) {
        WORDS.forEach((_, i) => {
          setTokPos(i, tokX(i), lerp(tokBaseY(), tokBaseY() - 10, pt * 0.3), 1, lerp(1, 0.7, pt));
          setEmbPos(i, tokX(i) - 1, lerp(115, 130, pt * 0.3), lerp(0.25, 0.12, pt), 1);
          [...embEls[i].children].forEach((c, d) => {
            const aw = ANORM[i];
            const vv = vVal(i, d % 8);
            c.style.opacity = (0.1 + vv * aw * pt * 2).toFixed(2);
            const r0 = parseInt(C[i].slice(1, 3), 16), g0 = parseInt(C[i].slice(3, 5), 16), b0 = parseInt(C[i].slice(5, 7), 16);
            const fr = Math.round(r0 + (255 - r0) * pt * aw * 3), fg = Math.round(g0 + (123 - g0) * pt * aw * 3), fb = Math.round(b0 + (53 - b0) * pt * aw * 3);
            c.style.background = `rgb(${Math.min(255, fr)},${Math.min(255, fg)},${Math.min(255, fb)})`;
          });
        });
        drawValueMerge(pt);
        setFormula("new_sat = Σ α_i · V_i   weighted blend of all Values");
      }

      // Phase 7 — FFN
      else if (curPhase === 7) {
        WORDS.forEach((_, i) => {
          setTokPos(i, tokX(i), tokBaseY(), 1, lerp(1, 0, pt * 2));
          setEmbPos(i, tokX(i) - 1, 115, 0, 1);
        });
        drawFFN(pt);
        setFormula('FFN(x)=ReLU(xW₁+b₁)W₂+b₂  →  Add&Norm  →  logits');
      }

      // Phase 8 — output probs
      else if (curPhase === 8) {
        // shouldn't happen — clamp
      }
    }

    function setFormula(text) {
      const el = document.getElementById('formulaPill');
      el.textContent = text;
      el.classList.add('visible');
    }

    // ─── Output phase ─────────────────────────────────────────
    function renderOutputPhase(pt) {
      WORDS.forEach((_, i) => {
        setTokPos(i, tokX(i), tokBaseY(), 1, 0);
        setEmbPos(i, tokX(i) - 1, 115, 0, 1);
      });
      drawOutputBars(pt);
      setFormula('softmax(W_out · h_final)  →  P(next token ∈ vocab)');
    }

    // ─── Main loop ────────────────────────────────────────────
    function frame(ts) {
      if (!playing) { rafId = null; return; }
      if (!lastTs) lastTs = ts;
      const dt = Math.min(40, ts - lastTs);
      lastTs = ts;

      const ph = PHASES[curPhase];
      if (!ph) { playing = false; rafId = null; return; }

      phaseT += (dt / ph.duration) * speed;

      if (phaseT >= 1) {
        phaseT = 1;
        if (curPhase === 7) {
          // last phase of main + trigger output
          renderOutputPhase(1);
        }
        // auto advance after brief pause
        setTimeout(() => {
          if (playing && curPhase < PHASES.length - 1) {
            nextPhase();
          } else {
            playing = false;
            document.getElementById('btnPlayPause').textContent = '↺ replay';
            document.getElementById('btnPlayPause').classList.remove('primary');
          }
        }, 800);
        phaseT = 1;
      }

      advanceTypewriterSegment(phaseT);
      tickTypewriter(ts);

      if (curPhase === 7) renderOutputPhase(phaseT);
      else renderPhase(phaseT, ts);

      document.getElementById('progFill').style.width =
        ((curPhase / PHASES.length + phaseT / PHASES.length) * 100).toFixed(1) + '%';

      rafId = requestAnimationFrame(frame);
    }

    // ─── Controls ─────────────────────────────────────────────
    function jumpToPhase(i) {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;
      curPhase = Math.max(0, Math.min(PHASES.length - 1, i));
      phaseT = 0;
      lastTs = null;
      updateStrip();
      updateInfoBar();
      startTypewriter(curPhase);
      document.getElementById('formulaPill').classList.remove('visible');
      if (playing) { rafId = requestAnimationFrame(frame); }
      else renderPhase(0, 0);
    }

    function nextPhase() {
      if (curPhase >= PHASES.length - 1) return;
      jumpToPhase(curPhase + 1);
      if (!playing) { playing = true; document.getElementById('btnPlayPause').textContent = '⏸ pause'; document.getElementById('btnPlayPause').className = 'ctrl-btn primary'; rafId = requestAnimationFrame(frame); }
    }
    function prevPhase() {
      if (curPhase <= 0) return;
      jumpToPhase(curPhase - 1);
      if (!playing) { playing = true; document.getElementById('btnPlayPause').textContent = '⏸ pause'; document.getElementById('btnPlayPause').className = 'ctrl-btn primary'; rafId = requestAnimationFrame(frame); }
    }

    function togglePlay() {
      const btn = document.getElementById('btnPlayPause');
      if (phaseT >= 1 && curPhase >= PHASES.length - 1) { restartAll(); return; }
      playing = !playing;
      if (playing) {
        btn.textContent = '⏸ pause'; btn.className = 'ctrl-btn primary';
        lastTs = null;
        rafId = requestAnimationFrame(frame);
      } else {
        btn.textContent = '▶ play'; btn.className = 'ctrl-btn';
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      }
    }

    function restartAll() {
      if (rafId) cancelAnimationFrame(rafId);
      curPhase = 0; phaseT = 0; playing = true; lastTs = null;
      document.getElementById('btnPlayPause').textContent = '⏸ pause';
      document.getElementById('btnPlayPause').className = 'ctrl-btn primary';
      document.getElementById('progFill').style.width = '0%';
      document.getElementById('formulaPill').classList.remove('visible');
      buildDOM();
      updateStrip();
      updateInfoBar();
      startTypewriter(0);
      rafId = requestAnimationFrame(frame);
    }

    function setSpeed(v) { speed = parseFloat(v); }

    function updateInfoBar() {
      document.getElementById('phaseName').textContent = PHASES[curPhase].name;
      document.getElementById('phaseCount').textContent = (curPhase + 1) + ' / ' + PHASES.length;
    }

    // ─── Init ─────────────────────────────────────────────────
    window.addEventListener('load', () => {
      resizeCanvas();
      buildStrip();
      buildDOM();
      updateStrip();
      updateInfoBar();
      startTypewriter(0);
      rafId = requestAnimationFrame(frame);
    });

    window.addEventListener('resize', () => {
      resizeCanvas();
      buildDOM();
      if (!playing) renderPhase(phaseT, 0);
    });
  </script>
</div>
